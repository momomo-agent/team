<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title id="page-title">DevTeam</title>
  <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23888'/></svg>">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --card: #181818;
      --border: #222;
      --text: #e0e0e0;
      --dim: #666;
      --accent: #4ade80;
      --blue: #60a5fa;
      --warn: #f59e0b;
      --error: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-size: 13px; }

    /* Top Bar */
    .topbar { background: var(--surface); padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; min-height: 48px; }
    .project-name { font-size: 16px; font-weight: 700; color: #fff; white-space: nowrap; }
    .status-badge { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .status-badge.running { background: var(--accent); color: #000; }
    .status-badge.idle { background: #333; color: var(--dim); }
    .topbar-agents { display: flex; gap: 6px; overflow-x: auto; flex: 1; align-items: center; margin-left: 8px; }
    .agent-chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--card); border-radius: 4px; border: 1px solid var(--border); white-space: nowrap; font-size: 11px; transition: border-color 0.2s; }
    .agent-chip:hover { border-color: #444; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0; }
    .dot.running { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.error { background: var(--error); box-shadow: 0 0 6px var(--error); }
    .agent-task-text { color: var(--dim); font-size: 10px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
    .agent-count { font-size: 11px; color: var(--dim); white-space: nowrap; margin-left: auto; padding-left: 10px; }
    .daemon-btn { padding: 5px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; color: var(--text); cursor: pointer; font-size: 11px; font-family: inherit; transition: border-color 0.2s; }
    .daemon-btn:hover { border-color: #555; }

    /* Three-column layout */
    .main { display: grid; grid-template-columns: 1fr 1fr 1.5fr; height: calc(100vh - 48px); }
    .main.focused { grid-template-columns: 1fr !important; }
    .col { padding: 16px; overflow-y: auto; border-right: 1px solid var(--border); }
    .col:last-child { border-right: none; }
    .col::-webkit-scrollbar { width: 5px; }
    .col::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .col::-webkit-scrollbar-track { background: transparent; }
    .col.hidden { display: none; }

    /* Section titles */
    .section-title { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; cursor: default; user-select: none; }
    .col-close { cursor: pointer; font-size: 14px; color: var(--dim); padding: 2px 6px; display: none; border-radius: 3px; }
    .col-close:hover { color: var(--text); background: var(--card); }
    .section-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0 14px; }

    /* Match percentage - large number with bar */
    .match-display { margin-bottom: 12px; }
    .match-number { font-size: 36px; font-weight: 800; line-height: 1; }
    .match-number .pct { font-size: 20px; font-weight: 600; }
    .match-number.green { color: var(--accent); }
    .match-number.yellow { color: var(--warn); }
    .match-number.red { color: var(--error); }
    .match-bar { height: 4px; border-radius: 2px; background: #333; margin-top: 6px; overflow: hidden; }
    .match-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    .match-bar-fill.green { background: var(--accent); }
    .match-bar-fill.yellow { background: var(--warn); }
    .match-bar-fill.red { background: var(--error); }
    .match-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }

    /* Gaps list */
    .gap-list { list-style: none; padding: 0; margin: 8px 0 0; }
    .gap-list li { font-size: 11px; color: #aaa; padding: 3px 0 3px 12px; position: relative; line-height: 1.5; }
    .gap-list li::before { content: '\2022'; position: absolute; left: 0; color: var(--warn); }

    /* Markdown content */
    .md-content { font-size: 12px; line-height: 1.6; color: #bbb; }
    .md-content h1, .md-content h2, .md-content h3 { color: var(--text); margin: 10px 0 5px; }
    .md-content h1 { font-size: 15px; } .md-content h2 { font-size: 13px; } .md-content h3 { font-size: 12px; }
    .md-content ul { padding-left: 16px; }
    .md-content code { background: var(--card); padding: 1px 4px; border-radius: 3px; }

    /* Collapsible */
    .collapsible-toggle { font-size: 11px; color: var(--blue); cursor: pointer; margin-top: 8px; display: inline-block; }
    .collapsible-toggle:hover { text-decoration: underline; }
    .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .collapsible-content.open { max-height: 5000px; }

    /* Module list */
    .module-list { margin-top: 8px; }
    .module-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 4px; font-size: 11px; }
    .module-name { flex: 1; }
    .module-status { padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 600; text-transform: uppercase; }
    .module-status.implemented { background: rgba(74,222,128,0.15); color: var(--accent); }
    .module-status.partial { background: rgba(245,158,11,0.15); color: var(--warn); }
    .module-status.missing { background: rgba(239,68,68,0.15); color: var(--error); }
    .module-coverage { font-size: 10px; color: var(--dim); min-width: 32px; text-align: right; }

    /* Mermaid */
    .mermaid { background: var(--card); border-radius: 6px; padding: 10px; border: 1px solid var(--border); margin-top: 8px; overflow-x: auto; }

    /* Milestone cards */
    .ms-list { display: flex; flex-direction: column; gap: 6px; }
    .ms-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; transition: all 0.2s; }
    .ms-card:hover { border-color: #333; }
    .ms-card.active { border-color: var(--blue); border-width: 2px; }
    .ms-card.done { opacity: 0.5; }
    .ms-card.planned { opacity: 0.7; }
    .ms-card.selected { outline: 2px solid var(--blue); outline-offset: -2px; }
    .ms-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .ms-name { font-size: 12px; font-weight: 600; }
    .ms-status-badge { padding: 2px 8px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
    .ms-status-badge.done { background: rgba(74,222,128,0.15); color: var(--accent); }
    .ms-status-badge.active { background: rgba(96,165,250,0.15); color: var(--blue); }
    .ms-status-badge.planned { background: #222; color: var(--dim); }
    .ms-progress { display: flex; align-items: center; gap: 8px; }
    .ms-bar-bg { flex: 1; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
    .ms-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    .ms-card.active .ms-bar-fill { background: var(--blue); }
    .ms-card.done .ms-bar-fill { background: var(--accent); }
    .ms-card.planned .ms-bar-fill { background: #444; }
    .ms-pct { font-size: 10px; color: var(--dim); min-width: 60px; text-align: right; }

    /* Kanban */
    .kanban-stats { display: flex; gap: 12px; margin-bottom: 12px; padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; font-size: 11px; }
    .kanban-stat { color: var(--dim); }
    .kanban-stat strong { color: var(--text); font-size: 14px; margin-right: 3px; }
    .kanban-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .kanban-col { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px; min-height: 100px; }
    .kanban-col-title { font-size: 10px; color: var(--dim); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .kanban-count { background: var(--border); padding: 1px 6px; border-radius: 10px; font-size: 10px; color: var(--text); }
    .task { padding: 8px; border-radius: 4px; margin-bottom: 5px; border: 1px solid var(--border); background: var(--bg); font-size: 11px; transition: border-color 0.2s; }
    .task:hover { border-color: #444; }
    .task-title { font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
    .task-meta { display: flex; gap: 4px; font-size: 10px; color: var(--dim); flex-wrap: wrap; align-items: center; }
    .priority { padding: 1px 5px; border-radius: 2px; font-weight: 700; font-size: 9px; }
    .priority.p0 { background: var(--error); color: #fff; }
    .priority.p1 { background: var(--warn); color: #000; }
    .priority.p2 { background: #444; color: #ccc; }
    .task-ms { padding: 1px 5px; border-radius: 2px; font-size: 9px; background: rgba(96,165,250,0.15); color: var(--blue); }
    .task-assignee { color: var(--dim); }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div class="topbar">
    <span class="project-name" id="project-name">DevTeam</span>
    <span class="status-badge idle" id="status-badge">IDLE</span>
    <div class="topbar-agents" id="agent-bar"></div>
    <span class="agent-count" id="agent-count"></span>
    <button id="toggle-daemon" class="daemon-btn">Start</button>
  </div>

  <!-- Three-column Main -->
  <div class="main" id="main-grid">
    <!-- Left: Vision -->
    <div class="col" data-col="vision">
      <div class="section-title"><span class="col-label">Vision</span><span class="col-close">&#10005;</span></div>
      <div id="vision-content"></div>
    </div>

    <!-- Middle: Architecture -->
    <div class="col" data-col="architecture">
      <div class="section-title"><span class="col-label">Architecture</span><span class="col-close">&#10005;</span></div>
      <div id="architecture-content"></div>
    </div>

    <!-- Right: Milestones + Kanban -->
    <div class="col" data-col="milestones">
      <div class="section-title"><span class="col-label">Milestones</span><span class="col-close">&#10005;</span></div>
      <div id="milestone-content"></div>
      <hr class="section-divider">
      <div class="section-title"><span class="col-label">Kanban</span></div>
      <div id="kanban-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
