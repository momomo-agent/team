<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">Team Dashboard</title>
  <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%234ade80'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/agentic-render@latest/dist/style.css">
  <script src="https://cdn.jsdelivr.net/npm/agentic-render@latest/dist/agentic-render.umd.js"></script>
  <style>
    :root {
      --bg: #e8e6e1;
      --paper: #fff;
      --paper-shadow: rgba(0,0,0,0.08);
      --text: #1a1a1a;
      --dim: #888;
      --border: #d4d2cd;
      --accent: #2d8a4e;
      --blue: #2563eb;
      --warn: #d97706;
      --error: #dc2626;
      --tab-inactive: #d4d2cd;
      --tab-active: #fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-size: 13px; }

    /* Top Bar */
    .topbar { background: transparent; padding: 10px 24px; display: flex; align-items: center; gap: 14px; min-height: 48px; }
    .project-info { display: flex; flex-direction: column; gap: 2px; }
    .project-name { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; line-height: 1.2; }
    .workflow-name { font-size: 11px; font-weight: 500; color: var(--dim); white-space: nowrap; line-height: 1.2; }
    .status-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .status-badge.running { background: #dcfce7; color: var(--accent); }
    .status-badge.idle { background: #f3f3f0; color: var(--dim); }
    .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .agent-count { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .daemon-btn { padding: 5px 14px; background: #f5f5f3; border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 500; }
    .daemon-btn:hover { background: #eee; }

    /* Two-column main */
    .main { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 48px); gap: 24px; padding: 0 24px 24px; }

    /* Left: folder/article metaphor */
    .col-left { display: flex; flex-direction: column; overflow: hidden; }

    /* Folder tabs */
    .folder-tabs { display: flex; align-items: flex-end; gap: 4px; position: relative; z-index: 1; }
    .folder-tab {
      padding: 8px 18px 10px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--dim); background: var(--tab-inactive);
      border-radius: 8px 8px 0 0; cursor: pointer; position: relative;
      border: 1px solid var(--border); border-bottom: none; transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .folder-tab:hover { background: #e0deda; }
    .folder-tab.active { background: var(--paper); color: var(--text); z-index: 2; border-color: var(--border); box-shadow: 0 -2px 4px var(--paper-shadow); }
    .tab-match { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
    .tab-match.green { background: #dcfce7; color: var(--accent); }
    .tab-match.yellow { background: #fef3c7; color: var(--warn); }
    .tab-match.red { background: #fee2e2; color: var(--error); }

    /* Paper area */
    .paper {
      flex: 1; background: var(--paper); border-radius: 0 8px 8px 8px;
      padding: 24px; overflow-y: auto;
      border: 1px solid var(--border); border-top: none;
      box-shadow: 0 2px 8px var(--paper-shadow); position: relative; margin-top: -1px;
    }
    .paper::-webkit-scrollbar { width: 4px; }
    .paper::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Match display */
    .match-display { margin-bottom: 20px; }
    .match-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .match-number { font-size: 32px; font-weight: 800; line-height: 1; }
    .match-number .pct { font-size: 18px; font-weight: 600; }
    .match-number.green { color: var(--accent); }
    .match-number.yellow { color: var(--warn); }
    .match-number.red { color: var(--error); }
    .match-bar { height: 3px; border-radius: 2px; background: #eee; margin-top: 6px; overflow: hidden; }
    .match-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .match-bar-fill.green { background: var(--accent); }
    .match-bar-fill.yellow { background: var(--warn); }
    .match-bar-fill.red { background: var(--error); }

    /* Gaps */
    .gap-list { list-style: none; padding: 0; margin: 0 0 16px; }
    .gap-list li { font-size: 12px; color: #666; padding: 4px 0 4px 14px; position: relative; line-height: 1.5; }
    .gap-list li::before { content: '•'; position: absolute; left: 0; color: var(--warn); font-weight: 700; }

    /* Markdown content */
    .md-content { font-size: 13px; line-height: 1.7; color: #444; border-top: 1px solid #eee; padding-top: 16px; margin-top: 12px; }
    .md-content h1, .md-content h2, .md-content h3 { color: var(--text); margin: 14px 0 6px; }
    .md-content h1 { font-size: 16px; } .md-content h2 { font-size: 14px; } .md-content h3 { font-size: 13px; }
    .md-content ul { padding-left: 18px; }
    .md-content code { background: #f5f5f3; padding: 1px 5px; border-radius: 3px; font-size: 12px; }

    /* Module list */
    .module-list { margin: 12px 0; }
    .module-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #f0f0ee; font-size: 12px; }
    .module-item:last-child { border-bottom: none; }
    .module-name { flex: 1; font-weight: 500; }
    .module-status { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .module-status.implemented { background: #dcfce7; color: var(--accent); }
    .module-status.partial { background: #fef3c7; color: var(--warn); }
    .module-status.missing { background: #fee2e2; color: var(--error); }
    .module-coverage { font-size: 11px; color: var(--dim); min-width: 32px; text-align: right; }

    /* Mermaid */
    .mermaid-wrap { background: #fafaf8; border-radius: 8px; padding: 12px; border: 1px solid #eee; margin: 12px 0; overflow-x: auto; }

    /* ====== Right Column ====== */
    .col-right { display: flex; flex-direction: column; overflow: hidden; }

    /* Right tabs (Pipeline / Kanban / Milestones) */
    .right-tabs { display: flex; align-items: flex-end; gap: 4px; position: relative; z-index: 1; }
    .right-tab {
      padding: 8px 18px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--dim); background: var(--tab-inactive);
      border-radius: 8px 8px 0 0; cursor: pointer;
      border: 1px solid var(--border); border-bottom: none; transition: all 0.15s;
    }
    .right-tab:hover { background: #e0deda; }
    .right-tab.active { background: var(--paper); color: var(--text); z-index: 2; box-shadow: 0 -2px 4px var(--paper-shadow); }

    .right-paper {
      flex: 1; background: var(--paper); border-radius: 0 8px 8px 8px;
      padding: 20px; overflow-y: auto;
      border: 1px solid var(--border); border-top: none;
      box-shadow: 0 2px 8px var(--paper-shadow); margin-top: -1px;
    }
    .right-paper::-webkit-scrollbar { width: 4px; }
    .right-paper::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    .right-pane { display: none; }
    .right-pane.active { display: block; }

    /* ====== Pipeline View ====== */
    .pipeline-stage {
      border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px;
      overflow: hidden; transition: all 0.2s;
    }
    .pipeline-stage.has-active { border-color: var(--blue); box-shadow: 0 0 0 1px rgba(37,99,235,0.15); }
    .pipeline-stage.has-error { border-color: var(--error); }

    .stage-header {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: #fafaf8; cursor: pointer; user-select: none;
    }
    .stage-header:hover { background: #f5f5f3; }
    .stage-icon { font-size: 16px; flex-shrink: 0; }
    .stage-name { font-size: 12px; font-weight: 600; flex: 1; }
    .stage-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .stage-status-dot.idle { background: #d4d2cd; }
    .stage-status-dot.running { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.5s infinite; }
    .stage-status-dot.error { background: var(--error); }
    .stage-status-dot.waiting { background: var(--warn); opacity: 0.6; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .stage-body { padding: 0 14px 12px; }

    /* Agent in pipeline */
    .pipeline-agent {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: #fafaf8; border-radius: 6px; margin-top: 6px; font-size: 12px;
    }
    .pipeline-agent.running { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .pipeline-agent.error { background: #fef2f2; border: 1px solid #fecaca; }
    .pipeline-agent.retrying { background: #fffbeb; border: 1px solid #fde68a; }

    .pa-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pa-dot.running { background: var(--accent); animation: pulse 1.5s infinite; }
    .pa-dot.idle { background: #d4d2cd; }
    .pa-dot.error { background: var(--error); }
    .pa-dot.retrying { background: var(--warn); animation: pulse 1s infinite; }
    .pa-name { font-weight: 600; min-width: 80px; }
    .pa-task { color: var(--dim); font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pa-time { color: var(--dim); font-size: 10px; white-space: nowrap; }

    /* Stage event log (collapsed by default) */
    .stage-events { margin-top: 8px; padding-top: 6px; border-top: 1px solid #eee; }
    .stage-event { display: flex; gap: 6px; font-size: 10px; color: var(--dim); padding: 2px 0; align-items: center; }
    .se-time { min-width: 40px; }
    .se-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .se-dot.agent_start { background: var(--blue); }
    .se-dot.agent_complete { background: var(--accent); }
    .se-dot.error { background: var(--error); }
    .se-dot.milestone_complete { background: var(--warn); }

    /* Stage empty state */
    .stage-empty { font-size: 11px; color: var(--dim); padding: 4px 0; font-style: italic; }

    /* Pipeline connector line */
    .pipeline-connector { width: 1px; height: 10px; background: var(--border); margin: 0 auto; }

    /* ====== Kanban ====== */
    .kanban-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .kanban-stats { display: flex; gap: 12px; font-size: 11px; color: var(--dim); }
    .kanban-stats strong { color: var(--text); font-weight: 700; margin-right: 2px; }
    .section-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }

    .kanban-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
    .kanban-col { min-height: 60px; }
    .kanban-col-title { font-size: 10px; color: var(--dim); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 6px; border-bottom: 2px solid #e0deda; }
    .kanban-count { font-size: 10px; color: var(--dim); font-weight: 600; }

    .task { padding: 10px; border-radius: 8px; margin-bottom: 6px; background: var(--paper); border: 1px solid var(--border); font-size: 12px; box-shadow: 0 1px 3px var(--paper-shadow); transition: box-shadow 0.15s; }
    .task:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .task-title { font-weight: 500; margin-bottom: 5px; line-height: 1.4; }
    .task-meta { display: flex; gap: 4px; font-size: 10px; color: var(--dim); flex-wrap: wrap; align-items: center; }
    .priority { padding: 1px 5px; border-radius: 3px; font-weight: 700; font-size: 9px; }
    .priority.p0 { background: #fee2e2; color: var(--error); }
    .priority.p1 { background: #fef3c7; color: var(--warn); }
    .priority.p2 { background: #f3f3f0; color: #888; }
    .task-ms { padding: 1px 5px; border-radius: 3px; font-size: 9px; background: #dbeafe; color: var(--blue); }
    .task-assignee { color: var(--dim); }

    /* Milestone filter bar in kanban */
    .ms-filter-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .ms-filter-chip { padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: #f5f5f3; color: var(--dim); transition: all 0.15s; }
    .ms-filter-chip:hover { background: #eee; }
    .ms-filter-chip.active { background: #dbeafe; color: var(--blue); border-color: var(--blue); }

    /* ====== Milestones ====== */
    .ms-list { margin-bottom: 24px; }
    .ms-row { padding: 10px 0; border-bottom: 1px solid #e0deda; cursor: default; }
    .ms-row:last-child { border-bottom: none; }
    .ms-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .ms-name { font-size: 13px; font-weight: 600; }
    .ms-status-badge { padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
    .ms-status-badge.done { background: #dcfce7; color: var(--accent); }
    .ms-status-badge.active { background: #dbeafe; color: var(--blue); }
    .ms-status-badge.planned { background: #f3f3f0; color: var(--dim); }
    .ms-progress { display: flex; align-items: center; gap: 8px; }
    .ms-bar-bg { flex: 1; height: 3px; background: #e0deda; border-radius: 2px; overflow: hidden; }
    .ms-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .ms-row.active .ms-bar-fill { background: var(--blue); }
    .ms-row.done .ms-bar-fill { background: var(--accent); }
    .ms-row.planned .ms-bar-fill { background: #ccc; }
    .ms-pct { font-size: 11px; color: var(--dim); min-width: 60px; text-align: right; }

    /* Milestone task list */
    .ms-tasks { margin-top: 8px; padding-left: 12px; }
    .ms-task-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 11px; }
    .ms-task-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .ms-task-dot.done { background: var(--accent); }
    .ms-task-dot.in-progress { background: var(--blue); }
    .ms-task-dot.todo { background: var(--border); }
    .ms-task-name { color: #555; }
    .ms-task-name.done { text-decoration: line-through; color: var(--dim); }

    /* ====== Logs ====== */
    .log-entry { display: flex; gap: 8px; padding: 3px 0; font-family: monospace; font-size: 11px; border-bottom: 1px solid #f0f0ee; align-items: baseline; }
    .log-time { color: var(--dim); min-width: 42px; flex-shrink: 0; }
    .log-agent { min-width: 90px; flex-shrink: 0; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-details { color: #555; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-entry.error .log-agent, .log-entry.error .log-details { color: var(--error); }
    .log-entry.agent_complete .log-agent { color: var(--accent); }
    .log-entry.agent_start .log-agent { color: var(--blue); }

    /* ====== Mobile ====== */
    @media (max-width: 768px) {
      body { height: auto; overflow: auto; }

      .topbar { padding: 10px 16px; gap: 8px; flex-wrap: wrap; }
      .project-name { font-size: 14px; }

      .main {
        display: flex; flex-direction: column;
        height: auto; min-height: calc(100vh - 48px);
        padding: 0 12px 12px; gap: 0;
      }

      /* Hide separate tab bars on mobile */
      .folder-tabs, .right-tabs { display: none; }

      /* Show unified mobile tab bar */
      .mobile-tabs {
        display: flex !important; align-items: center; gap: 3px;
        overflow-x: auto; -webkit-overflow-scrolling: touch;
        padding: 8px 0 0; position: sticky; top: 0; z-index: 10;
        background: var(--bg);
      }
      .mobile-tabs::-webkit-scrollbar { display: none; }
      .mobile-tab {
        padding: 7px 12px 9px; font-size: 10px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.3px;
        color: var(--dim); background: var(--tab-inactive);
        border-radius: 8px 8px 0 0; cursor: pointer; white-space: nowrap;
        border: 1px solid var(--border); border-bottom: none; flex-shrink: 0;
      }
      .mobile-tab:hover { background: #e0deda; }
      .mobile-tab.active { background: var(--paper); color: var(--text); box-shadow: 0 -2px 4px var(--paper-shadow); }
      .mobile-tab .tab-match { font-size: 9px; margin-left: 3px; }

      /* Single paper container on mobile */
      .col-left, .col-right { display: none; }
      .mobile-paper {
        display: block !important;
        background: var(--paper); border-radius: 0 0 8px 8px;
        padding: 16px; min-height: 60vh;
        border: 1px solid var(--border); border-top: none;
        box-shadow: 0 2px 8px var(--paper-shadow); margin-top: -1px;
      }

      /* Kanban: stack columns vertically on mobile */
      .kanban-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .ms-filter-bar { gap: 4px; }
      .ms-filter-chip { font-size: 9px; padding: 3px 8px; }
    }

    /* Desktop: hide mobile elements */
    .mobile-tabs { display: none; }
    .mobile-paper { display: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="project-info">
      <div class="project-name" id="project-name">DevTeam</div>
      <div class="workflow-name" id="workflow-name">—</div>
    </div>
    <span class="status-badge idle" id="status-badge">IDLE</span>
    <div class="topbar-right">
      <span class="agent-count" id="agent-count"></span>
      <button id="toggle-daemon" class="daemon-btn">Start</button>
    </div>
  </div>

  <div class="main">
    <!-- Mobile: unified tab bar + single paper (right tabs first, then left) -->
    <div class="mobile-tabs" id="mobile-tab-bar">
      <div class="mobile-tab active" data-mtab="pipeline">Pipeline</div>
      <div class="mobile-tab" data-mtab="kanban">Kanban</div>
      <div class="mobile-tab" data-mtab="milestones">Milestones</div>
      <div class="mobile-tab" data-mtab="vision">Vision <span class="tab-match" id="m-tab-match-vision">—</span></div>
      <div class="mobile-tab" data-mtab="prd">PRD <span class="tab-match" id="m-tab-match-prd">—</span></div>
      <div class="mobile-tab" data-mtab="dbb">DBB <span class="tab-match" id="m-tab-match-dbb">—</span></div>
      <div class="mobile-tab" data-mtab="arch">Arch <span class="tab-match" id="m-tab-match-arch">—</span></div>
    </div>
    <div class="mobile-paper" id="mobile-paper"></div>

    <!-- Desktop: Left column -->
    <div class="col-left">
      <div class="folder-tabs" id="tab-bar">
        <!-- Tabs dynamically generated from config -->
      </div>
      <div class="paper">
        <!-- Panes dynamically generated from config -->
      </div>
    </div>

    <!-- Right: Pipeline / Kanban / Milestones -->
    <div class="col-right">
      <div class="right-tabs" id="right-tab-bar">
        <div class="right-tab active" data-rtab="pipeline">Pipeline</div>
        <div class="right-tab" data-rtab="kanban">Kanban</div>
        <div class="right-tab" data-rtab="milestones">Milestones</div>
        <div class="right-tab" data-rtab="logs">Logs</div>
      </div>
      <div class="right-paper">
        <div class="right-pane active" id="rpane-pipeline"></div>
        <div class="right-pane" id="rpane-kanban"></div>
        <div class="right-pane" id="rpane-milestones"></div>
        <div class="right-pane" id="rpane-logs"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
